<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva Consulta — Panel Médico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/estilos.css">
</head>
<body class="consulta-page">

<div class="consulta-topbar">
  <a class="back-btn" onclick="window.location.href='detalle-paciente.html'">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Volver
  </a>
  <div class="topbar-title">
    Nueva Consulta
    <span></span>
  </div>
</div>

<div class="consulta-content">
  <div class="patient-chip">
    <div class="patient-chip-avatar">MG</div>
    <div>
      <div class="patient-chip-name">María González</div>
      <div class="patient-chip-sub">Últimas consultas: 15 Mar 2024</div>
    </div>
  </div>

  <!-- TIPO DE CONSULTA -->
  <div class="form-card">
    <div class="form-card-title">
      <svg class="card-title-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Tipo de Consulta
    </div>
    <div class="tipo-grid">
      <div class="tipo-option selected-dorado" id="opt-clinica" onclick="selectTipo('clinica')">
        <div class="tipo-icon tipo-icon-dorado">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="1"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
        </div>
        <div>
          <div class="tipo-label">Clínica General</div>
          <div class="tipo-sub">Historia clínica médica</div>
        </div>
      </div>
      <div class="tipo-option" id="opt-estetica" onclick="selectTipo('estetica')">
        <div class="tipo-icon tipo-icon-rosa">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <div>
          <div class="tipo-label">Medicina Estética</div>
          <div class="tipo-sub">Tratamientos estéticos</div>
        </div>
      </div>
    </div>
  </div>

  <!-- FORMULARIO DINÁMICO -->
  <div class="form-card">
    <div class="form-card-title">
      <svg class="card-title-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Información de la Consulta
    </div>
    <div class="fields-grid">

      <!-- CLÍNICA GENERAL -->
      <div class="form-field fields-clinica active">
        <label>Fecha</label>
        <input type="date">
      </div>
      <div class="form-field fields-clinica active">
        <label>Motivo de Consulta</label>
        <input type="text" placeholder="Ej: Control periódico, brote de acné...">
      </div>
      <div class="form-field fields-clinica active">
        <label>Antecedentes Personales</label>
        <textarea placeholder="Alergias, enfermedades previas, cirugías, medicación crónica..."></textarea>
      </div>
      <div class="form-field fields-clinica active">
        <label>Examen Físico</label>
        <textarea placeholder="Descripción del examen físico, observaciones relevantes..."></textarea>
      </div>
      <div class="form-field fields-clinica active">
        <label>Tratamiento Habitual</label>
        <textarea placeholder="Medicamentos o tratamientos que el paciente realiza habitualmente..."></textarea>
      </div>
      <div class="form-field fields-clinica active">
        <label>Problemas Médicos</label>
        <textarea placeholder="Diagnósticos activos, patologías de base..."></textarea>
      </div>
      <div class="form-field fields-clinica active">
        <label>Conducta Médica</label>
        <textarea placeholder="Decisión clínica tomada en esta consulta..."></textarea>
      </div>
      <div class="form-field fields-clinica active">
        <label>Tratamiento Indicado</label>
        <textarea placeholder="Medicación, procedimientos indicados, próximos pasos..."></textarea>
      </div>

      <!-- MEDICINA ESTÉTICA -->
      <div class="form-field fields-estetica">
        <label>Fecha</label>
        <input type="date">
      </div>
      <div class="form-field fields-estetica">
        <label>Motivo de Consulta</label>
        <input type="text" placeholder="Ej: Rejuvenecimiento facial, manchas, relleno...">
      </div>
      <div class="form-field fields-estetica">
        <label>Zona a Tratar</label>
        <input type="text" placeholder="Ej: Frente, surco nasogeniano, labios...">
      </div>
      <div class="form-field fields-estetica">
        <label>Antecedentes Estéticos</label>
        <textarea placeholder="Tratamientos previos, reacciones adversas, alergias a productos..."></textarea>
      </div>
      <div class="form-field fields-estetica">
        <label>Evaluación de la Zona</label>
        <textarea placeholder="Estado actual de la piel, volumen, simetría, observaciones..."></textarea>
      </div>
      <div class="form-field fields-estetica">
        <label>Tratamiento Realizado</label>
        <textarea placeholder="Técnica aplicada, unidades, dosis, puntos de aplicación..."></textarea>
      </div>
      <div class="form-field fields-estetica">
        <label>Producto / Material Utilizado</label>
        <input type="text" placeholder="Ej: Botox 20U, ácido hialurónico 1ml...">
      </div>
      <div class="form-field fields-estetica">
        <label>Cuidados Post-Tratamiento</label>
        <textarea placeholder="Indicaciones para el paciente, restricciones, próxima sesión..."></textarea>
      </div>

    </div>
  </div>

  <!-- FOTOS -->
  <div class="form-card">
    <div class="form-card-title">
      <svg class="card-title-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Fotos del Procedimiento
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)">
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <svg class="upload-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <p class="upload-text"><strong>Toca para cargar fotos</strong></p>
      <p class="upload-text upload-hint">Cámara · Galería · Archivos — PNG, JPG hasta 10MB</p>
    </div>
    <div class="photo-previews" id="photoPreviews"></div>
  </div>

  <div class="form-actions">
    <button class="btn-cancel" onclick="window.location.href='detalle-paciente.html'">Cancelar</button>
    <button class="btn-pdf" onclick="guardarYGenerarPDF()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Guardar y Generar PDF
    </button>
    <button class="btn-save" onclick="window.location.href='detalle-paciente.html'">Guardar</button>
  </div>
</div>

<script src="/sistema_gestion/js/nueva-consulta.js"></script>

</body>
</html>
