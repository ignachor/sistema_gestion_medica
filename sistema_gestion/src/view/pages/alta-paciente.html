<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alta de Paciente — Panel Médico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../css/estilos.css">
  <style>

    /* ── SYNC INDICATOR ── */
    .sync-indicator {
      position: absolute;
      right: 2rem;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--gris-light);
      transition: color 0.3s;
      white-space: nowrap;
    }
    .sync-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gris-light);
      transition: background 0.3s;
      flex-shrink: 0;
    }
    .sync-indicator.saving { color: var(--dorado); }
    .sync-indicator.saving .sync-dot {
      background: var(--dorado);
      animation: pulse-dot 0.8s ease-in-out infinite;
    }
    .sync-indicator.saved { color: #4caf50; }
    .sync-indicator.saved .sync-dot { background: #4caf50; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* ── CAMPO REQUERIDO ── */
    .required-mark { color: var(--rosa-mid); font-size: 0.65rem; }
    .section-required-hint {
      font-size: 0.7rem; color: var(--gris-light); font-weight: 300;
      margin-bottom: 1.1rem;
    }
    .section-required-hint em { color: var(--rosa-mid); font-style: normal; }

    /* ── ESTADOS DNI ── */
    .field-hint {
      font-size: 0.68rem; font-weight: 500;
      margin-top: 0.15rem; display: none;
    }
    .field-hint.show { display: block; }
    .field-hint.error { color: #e53935; }
    .field-hint.ok    { color: #4caf50; }
    .form-field input.state-error {
      border-color: #e53935;
      box-shadow: 0 0 0 3px rgba(229,57,53,0.1);
    }
    .form-field input.state-ok {
      border-color: #4caf50;
      box-shadow: 0 0 0 3px rgba(76,175,80,0.1);
    }
    .hint-link {
      color: #e53935; font-weight: 600;
      text-decoration: underline; cursor: pointer;
    }

    /* ── GRIDS ── */
    .fields-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.1rem;
    }
    .span-2 { grid-column: 1 / -1; }
    @media (max-width: 640px) {
      .fields-grid-2 { grid-template-columns: 1fr; }
      .span-2 { grid-column: 1; }
    }

    /* ── TIPO 3 COLUMNAS ── */
    .tipo-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.75rem;
    }
    @media (max-width: 640px) {
      .tipo-grid-3 { grid-template-columns: 1fr; }
    }

    /* ── FOTO REMOVE ── */
    .photo-thumb-remove {
      position: absolute; top: 4px; right: 4px;
      width: 18px; height: 18px; border-radius: 50%;
      background: rgba(0,0,0,0.55); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #fff; font-size: 9px; line-height: 1;
      font-family: var(--mont);
    }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* ── BTN PDF ── */
    .btn-pdf {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.7rem 1.5rem;
      background: transparent;
      border: 1.5px solid var(--negro-mid);
      border-radius: 7px;
      font-family: var(--mont); font-size: 0.78rem; font-weight: 600;
      color: var(--negro-mid); cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .btn-pdf:hover { background: var(--negro); color: var(--blanco); border-color: var(--negro); }
    .btn-pdf:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── PRINT / FICHA PDF ── */
    #printFicha { display: none; }
    @media print {
      body > *:not(#printFicha) { display: none !important; }
      #printFicha {
        display: block !important;
        position: fixed; inset: 0;
        padding: 2.5rem 3rem;
        background: #fff;
        font-family: 'Montserrat', sans-serif;
        color: #1A1A1A;
        font-size: 12pt;
      }
    }

    /* ── MOBILE AJUSTES ── */
    @media (max-width: 768px) {
      .consulta-content { padding: 1.25rem 1rem 5rem; }
      .form-card { padding: 1.25rem 1rem; }
      .sync-indicator { font-size: 0.65rem; right: 1rem; }
    }
  </style>
</head>
<body class="consulta-page">

<!-- ── TOPBAR ── -->
<div class="consulta-topbar">
  <a class="back-btn" onclick="window.location.href='dashboard.html'">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Volver
  </a>
  <div class="topbar-title">
    Alta de Paciente
    <span></span>
  </div>
  <div class="sync-indicator" id="syncIndicator">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">Sin cambios</span>
  </div>
</div>

<!-- ── CONTENIDO ── -->
<div class="consulta-content">

  <!-- DATOS PERSONALES -->
  <div class="form-card">
    <div class="form-card-title">
      <svg class="card-title-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Datos Personales
    </div>
    <p class="section-required-hint">Los campos marcados con <em>*</em> son obligatorios.</p>

    <div class="fields-grid-2">

      <div class="form-field">
        <label>Nombre <span class="required-mark">*</span></label>
        <input type="text" id="inputNombre" placeholder="Ej: María" autocomplete="given-name" oninput="onFormChange()">
        <span class="field-hint" id="hintNombre"></span>
      </div>

      <div class="form-field">
        <label>Apellido <span class="required-mark">*</span></label>
        <input type="text" id="inputApellido" placeholder="Ej: González" autocomplete="family-name" oninput="onFormChange()">
        <span class="field-hint" id="hintApellido"></span>
      </div>

      <div class="form-field">
        <label>DNI <span class="required-mark">*</span></label>
        <input type="text" id="inputDni" placeholder="Ej: 32.456.789" maxlength="12" inputmode="numeric"
               oninput="onDniInput(this); onFormChange()">
        <span class="field-hint" id="hintDni"></span>
      </div>

      <div class="form-field">
        <label>Fecha de Nacimiento</label>
        <input type="date" id="inputFechaNac" oninput="onFormChange()">
      </div>

      <div class="form-field">
        <label>Teléfono / WhatsApp</label>
        <input type="tel" id="inputTelefono" placeholder="Ej: +54 9 11 5555-1234" autocomplete="tel" oninput="onFormChange()">
      </div>

      <div class="form-field">
        <label>Correo Electrónico</label>
        <input type="email" id="inputEmail" placeholder="Ej: maria@correo.com" autocomplete="email" oninput="onFormChange()">
      </div>

      <div class="form-field">
        <label>Obra Social / Prepaga</label>
        <input type="text" id="inputObraSocial" placeholder="Ej: OSDE, Swiss Medical, Sin cobertura..." oninput="onFormChange()">
      </div>

      <div class="form-field">
        <label>N.º de Afiliado</label>
        <input type="text" id="inputAfiliado" placeholder="Opcional" oninput="onFormChange()">
      </div>

    </div>

    <!-- Categoría -->
    <div style="margin-top:1.35rem;">
      <div class="form-field" style="margin-bottom:0.75rem;">
        <label>Categoría del Paciente <span class="required-mark">*</span></label>
      </div>
      <div class="tipo-grid-3">
        <div class="tipo-option selected-dorado" id="cat-clinica" onclick="selectCategoria('clinica')">
          <div class="tipo-icon tipo-icon-dorado">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="1"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
          </div>
          <div>
            <div class="tipo-label">Clínica</div>
            <div class="tipo-sub">Medicina general</div>
          </div>
        </div>
        <div class="tipo-option" id="cat-estetica" onclick="selectCategoria('estetica')">
          <div class="tipo-icon tipo-icon-rosa">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <div>
            <div class="tipo-label">Estética</div>
            <div class="tipo-sub">Tratamientos estéticos</div>
          </div>
        </div>
        <div class="tipo-option" id="cat-ambas" onclick="selectCategoria('ambas')">
          <div class="tipo-icon" style="background:rgba(212,175,55,0.1);color:var(--negro-mid);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          </div>
          <div>
            <div class="tipo-label">Ambas</div>
            <div class="tipo-sub">Clínica + Estética</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ANTECEDENTES MÉDICOS -->
  <div class="form-card">
    <div class="form-card-title">
      <svg class="card-title-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Antecedentes Médicos
    </div>
    <div class="fields-grid">
      <div class="form-field">
        <label>Alergias</label>
        <textarea id="inputAlergias" placeholder="Ej: Penicilina, AINE, látex... o 'Sin alergias conocidas'" oninput="onFormChange()"></textarea>
      </div>
      <div class="form-field">
        <label>Medicación Habitual</label>
        <textarea id="inputMedicacion" placeholder="Ej: Enalapril 10mg/día, Atorvastatina 20mg... o 'Ninguna'" oninput="onFormChange()"></textarea>
      </div>
      <div class="form-field">
        <label>Antecedentes Personales</label>
        <textarea id="inputAntecedentesP" placeholder="Enfermedades crónicas, cirugías previas, internaciones..." oninput="onFormChange()"></textarea>
      </div>
      <div class="form-field">
        <label>Antecedentes Familiares</label>
        <textarea id="inputAntecedentesF" placeholder="Diabetes, HTA, cardiopatías, cáncer familiar..." oninput="onFormChange()"></textarea>
      </div>
      <div class="form-field">
        <label>Observaciones Adicionales</label>
        <textarea id="inputObs" placeholder="Cualquier información relevante para el perfil del paciente..." oninput="onFormChange()"></textarea>
      </div>
    </div>
  </div>

  <!-- FOTOS INICIALES -->
  <div class="form-card">
    <div class="form-card-title">
      <svg class="card-title-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Fotos Iniciales
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)" style="display:none;">
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <svg class="upload-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <p class="upload-text"><strong>Toca para cargar fotos</strong></p>
      <p class="upload-text upload-hint">Cámara · Galería · Google Photos — PNG, JPG hasta 10MB</p>
    </div>
    <div class="photo-previews" id="photoPreviews"></div>
  </div>

  <!-- ACCIONES -->
  <div class="form-actions">
    <button class="btn-cancel" onclick="window.location.href='dashboard.html'">Cancelar</button>
    <button class="btn-pdf" id="btnPdf" onclick="generarFichaBienvenida()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Ficha de Bienvenida (PDF)
    </button>
    <button class="btn-save" onclick="guardarPaciente()">Guardar Paciente</button>
  </div>

</div>

<!-- CONTENEDOR OCULTO PARA IMPRIMIR -->
<div id="printFicha"></div>

<script src="../../../js/alta-paciente.js"></script>
</body>
</html>
